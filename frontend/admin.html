    <!-- LOGOUT -->

    <script>

        document
            .getElementById(
                'logoutAdmin'
            )
            .addEventListener(
                'click',
                () => {

                    localStorage.removeItem(
                        'user'
                    );

                    localStorage.removeItem(
                        'token'
                    );

                    window.location.href =
                        'admin-login.html';

                }
            );

    </script>

    <!-- DASHBOARD STATS -->

    <script>

async function loadStats() {

    try {

        const response =
            await fetch(
                'https://ecommerce-store-7ij2.onrender.com/api/products'
            );

        const products =
            await response.json();

        document.getElementById(
            'totalProducts'
        ).innerText =
            products.length;

        let totalOrders = 0;
        let totalRevenue = 0;
        let todayRevenue = 0;
        let productSales = {};
        let allOrders = [];

        const today =
            new Date()
                .toLocaleDateString();

        for (
            let i = 0;
            i < localStorage.length;
            i++
        ) {

            const key =
                localStorage.key(i);

            if (
                key.startsWith(
                    'orders_'
                )
            ) {

                const orders =
                    JSON.parse(
                        localStorage.getItem(
                            key
                        )
                    ) || [];

                    allOrders.push(
                    ...orders
                    );

                totalOrders +=
                    orders.length;

                orders.forEach(order => {

                    order.products.forEach(
                        product => {

                            totalRevenue +=
                                product.price *
                                (
                                    product.quantity
                                    || 1
                                );

                            const qty =
    product.quantity || 1;

if (
    productSales[product.name]
) {

    productSales[
        product.name
    ] += qty;

} else {

    productSales[
        product.name
    ] = qty;

}    

                        }
                    );

                    if (
                        order.date === today
                    ) {

                        order.products.forEach(
                            product => {

                                todayRevenue +=
                                    product.price *
                                    (
                                        product.quantity
                                        || 1
                                    );

                            }
                        );

                    }

                });

            }

        }

        document.getElementById(
            'totalOrders'
        ).innerText =
            totalOrders;

        document.getElementById(
            'totalRevenue'
        ).innerText =
            `₹${totalRevenue}`;

        document.getElementById(
            'todayRevenue'
        ).innerText =
            `₹${todayRevenue}`;


        let topProduct =
    'No Sales';

let maxSold = 0;

for (
    const productName
    in productSales
) {

    if (
        productSales[
            productName
        ] > maxSold
    ) {

        maxSold =
            productSales[
                productName
            ];

        topProduct =
            productName;

    }

}

latestOrdersHTML += `

<div style="
    display:flex;
    gap:15px;
    align-items:center;
    padding:15px 0;
    border-bottom:1px solid #eee;
">

    <img
        src="${order.products[0].image}"
        width="70"
        height="70"
        style="
            object-fit:cover;
            border-radius:12px;
        "
    >

    <div style="flex:1;">

        <h4>
            ${order.products[0].name}
        </h4>

        <p>
            Order #${order.id}
        </p>

        <p>
            ₹${orderTotal}
        </p>

    </div>

    <span
        style="
            padding:8px 15px;

            color:white;
            background:
            ${
                order.status === 'Delivered'
                ? '#10b981'
                : order.status === 'Shipped'
                ? '#3b82f6'
                : order.status === 'Processing'
                ? '#f59e0b'
                : '#ef4444'
            };
        "
    >
        ${order.status}
    </span>

</div>

`;

document.getElementById(
    'latestOrders'
).innerHTML =
    latestOrdersHTML;

document.getElementById(
    'topProduct'
).innerText =
    `${topProduct}`;

        const userResponse =
            await fetch(
                'https://ecommerce-store-7ij2.onrender.com/api/auth/users'
            );

        const users =
            await userResponse.json();

        document.getElementById(
            'totalUsers'
        ).innerText =
            users.length;

    } catch (error) {

        console.log(error);

    }

}

loadStats();

</script>
